version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: innovateconnect
      MYSQL_ROOT_PASSWORD: cdac
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    ports:
      - "5098:5098"
    environment:
      - DATABASE_URL=jdbc:mysql://db:3306/innovateconnect?useSSL=false&allowPublicKeyRetrieval=true
      - DATABASE_USER=root
      - DATABASE_PASSWORD=cdac
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
